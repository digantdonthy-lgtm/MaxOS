<html>
<head>
<title>MiniOS</title>
</head>
<body>
<div class="bar">
    <div>🍎 MaxOS</div>
    <div id="time"></div>
</div>
<img src="C:/Users/dell/Documents/HackClub/MiniOS/icon1.png" class="icon">
<p class="name">Text Editor</p>
<style>
body{
    margin: 0;
    background: url("C:/Users/dell/Documents/HackClub/MiniOS/index.png");
    background-size: cover;
    background-position: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-size: cover;
}
.bar{
    position: fixed;
    background:rgba(0,0,0,0.7);
    color: white;
    width: 98%;
    top:0;
    font-size: 14px;
    height: 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
}
.name{
    position: absolute;
    color:cyan;
    top:110px;
    left:20px;
    text-align: center;
    font-size: 12px;
    width:50px
}
.icon{
    position: absolute;
    left: 20px;
    top: 70px;
    width: 50px;
    border-radius: 15px;
}
.icon:hover {
    transform: scale(1.1);
}
</style>
<script>
setInterval(()=>{
     document.getElementById("time").innerText=new Date().toLocaleTimeString([],
     {
         hour:"2-digit",
         minute:"2-digit", 
         hour12: true 
     }); 
},1000);
</script>
</body>
</html>
